<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Treppenhaus-Check · BEROLINA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --green:#1B6E4A;
  --green-dark:#124F35;
  --green-pale:#E7F2EC;
  --orange:#EE8B22;
  --orange-dark:#C96A0D;
  --paper:#FCFCFA;
  --card:#FFFFFF;
  --ink:#20281F;
  --ink-soft:#647065;
  --line:#DCE5DE;
  --ok:#2F8F5B;
  --ok-bg:#E1F3E8;
  --warn:#DDA032;
  --warn-bg:#FBF0DB;
  --bad:#D24B36;
  --bad-bg:#FBE3DE;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--paper);
  color:var(--ink);
  font-family:'Inter', sans-serif;
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
h1,h2,h3,.display{font-family:'Poppins', sans-serif;}
#app{max-width:640px;margin:0 auto;padding:16px 16px 90px;min-height:100vh;}

.logo-mark{width:34px;height:34px;flex-shrink:0;position:relative;}
.logo-mark svg{width:100%;height:100%;display:block;}

.masthead{
  display:flex;align-items:center;gap:10px;justify-content:space-between;
  background:var(--green);
  border-radius:10px;
  padding:12px 14px;margin-bottom:16px;
  color:#fff;
}
.masthead .left{display:flex;align-items:center;gap:10px;}
.masthead .brand{font-family:'Poppins',sans-serif;font-weight:800;font-size:16px;line-height:1.15;text-transform:uppercase;letter-spacing:0.01em;}
.masthead .brand small{display:block;font-family:'Inter',sans-serif;font-weight:500;font-size:10.5px;color:#DFF0E7;text-transform:none;letter-spacing:0.02em;margin-top:1px;}
.masthead .who{font-size:11px;color:#DFF0E7;text-align:right;cursor:pointer;text-decoration:underline;text-underline-offset:3px;flex-shrink:0;}

.card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:12px;
  box-shadow:0 1px 3px rgba(20,50,35,0.06);
  padding:16px;margin-bottom:14px;
}
.field{margin-bottom:14px;}
.field label{display:block;font-size:11.5px;text-transform:uppercase;letter-spacing:0.04em;color:var(--ink-soft);margin-bottom:6px;font-weight:600;}
input[type=text],textarea{
  width:100%;
  background:#fff;
  border:1.5px solid var(--line);
  border-radius:8px;
  padding:10px 11px;
  font-family:'Inter',sans-serif;
  font-size:15px;
  color:var(--ink);
}
input[type=text]:focus,textarea:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px var(--green-pale);}
textarea{resize:vertical;min-height:56px;}

.btn{
  font-family:'Poppins',sans-serif;font-weight:700;
  border:none;border-radius:9px;
  background:var(--green);color:#fff;
  padding:13px 18px;font-size:14px;
  cursor:pointer;
  width:100%;
  transition:filter .1s ease, transform .08s ease;
}
.btn:active{transform:translateY(1px);}
.btn:disabled{opacity:0.4;cursor:not-allowed;}
.btn.secondary{background:var(--green-pale);color:var(--green-dark);}
.btn.orange{background:var(--orange);}
.btn.orange:hover{filter:brightness(0.96);}
.btn.ghost{background:transparent;border:1.5px solid var(--line);color:var(--ink-soft);box-shadow:none;font-weight:600;}
.btn.small{width:auto;padding:8px 14px;font-size:12.5px;}

.intro{font-size:12.5px;color:var(--ink-soft);line-height:1.55;margin-bottom:16px;}
.howto{font-size:12px;color:var(--green-dark);line-height:1.6;background:var(--green-pale);border-radius:8px;padding:10px 12px;margin-bottom:14px;}
.howto b{color:var(--green-dark);}
.deadline-box{font-size:12.5px;color:#8a4a12;line-height:1.5;background:#FDEFDD;border:1.5px solid var(--orange);border-radius:8px;padding:9px 12px;margin-bottom:14px;font-weight:600;}
.deadline-box b{color:var(--orange-dark);}
.stepnote{font-size:11px;color:var(--ink-soft);line-height:1.5;margin:4px 0 12px;}
.name-option{
  display:flex;align-items:center;gap:10px;
  padding:12px 12px;margin-bottom:8px;
  border:1.5px solid var(--line);border-radius:9px;
  font-size:14.5px;font-weight:600;color:var(--ink);
  cursor:pointer;background:#fff;
}
.name-option .name-dot{width:16px;height:16px;border-radius:50%;border:2px solid var(--line);flex-shrink:0;}
.name-option.active{border-color:var(--green);background:var(--green-pale);color:var(--green-dark);}
.name-option.active .name-dot{border-color:var(--green);background:var(--green);box-shadow:inset 0 0 0 3px #fff;}
.search{margin-bottom:10px;}
.obj-row{
  display:flex;align-items:flex-start;gap:10px;
  padding:11px 4px;border-bottom:1px solid var(--line);
  cursor:pointer;
}
.obj-row:last-child{border-bottom:none;}
.obj-row input[type=checkbox]{margin-top:3px;width:18px;height:18px;accent-color:var(--green);flex-shrink:0;}
.obj-row .meta{flex:1;}
.obj-row .meta .name{font-weight:600;font-size:14px;}
.obj-row .meta .sub{font-size:11px;color:var(--ink-soft);margin-top:2px;}
.wie-tag{
  font-family:'Poppins',sans-serif;font-weight:700;font-size:10px;
  background:var(--orange);color:#fff;padding:2px 7px;border-radius:20px;
  display:inline-block;margin-right:6px;
}
.count-pill{font-size:10px;color:var(--ink-soft);border:1px solid var(--line);padding:2px 6px;border-radius:10px;}

.progress-bar{height:9px;background:var(--line);border-radius:5px;position:relative;margin:10px 0 4px;overflow:hidden;}
.progress-bar .fill{height:100%;background:var(--green);transition:width .3s ease;}
.progress-label{font-size:11.5px;color:var(--ink-soft);display:flex;justify-content:space-between;}

.unit-row{
  display:flex;align-items:center;gap:10px;
  padding:12px 4px;border-bottom:1px solid var(--line);cursor:pointer;
}
.unit-row:last-child{border-bottom:none;}
.unit-row:active{background:var(--green-pale);}
.status-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0;border:1.5px solid var(--line);}
.status-dot.offen{background:#fff;}
.status-dot.progress{background:var(--warn);border-color:var(--warn);}
.status-dot.done{background:var(--ok);border-color:var(--ok);}
.unit-row .name{flex:1;}
.unit-row .name .addr{font-size:14px;font-weight:600;}
.unit-row .name .wieline{font-size:10.5px;color:var(--ink-soft);margin-top:2px;}
.unit-row .chev{color:var(--ink-soft);font-size:16px;}

.group-title{
  font-family:'Poppins',sans-serif;font-weight:700;font-size:13px;
  margin:20px 0 4px;color:var(--green-dark);
  border-bottom:2px solid var(--green-pale);padding-bottom:5px;
  display:flex;align-items:center;gap:6px;
}
.group-title:first-child{margin-top:0;}

.chip-row{display:flex;flex-wrap:wrap;gap:6px;}
.chip{
  border:1.5px solid var(--line);
  background:#fff;
  border-radius:8px;
  font-family:'Inter',sans-serif;
  font-weight:600;font-size:13px;
  padding:8px 4px;
  min-width:40px;text-align:center;
  cursor:pointer;flex:1;
  color:var(--ink);
}
.chip.small{flex:0 0 auto;min-width:38px;}
.chip.active{background:var(--ink);color:#fff;border-color:var(--ink);}
.chip.active.r1{background:var(--ok);border-color:var(--ok);}
.chip.active.r2{background:#5FA97D;border-color:#5FA97D;}
.chip.active.r3{background:var(--warn);border-color:var(--warn);}
.chip.active.r4{background:var(--bad);border-color:var(--bad);}
.chip.active.rnv{background:var(--ink-soft);border-color:var(--ink-soft);}
.cat-block{margin-bottom:16px;padding-bottom:14px;border-bottom:1px dashed var(--line);}
.cat-block:last-of-type{border-bottom:none;}
.cat-block .cat-name{font-size:13px;font-weight:700;margin-bottom:8px;}
.cat-block .cat-name .req{color:var(--orange-dark);}

.photo-strip{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;}
.photo-thumb{position:relative;width:56px;height:56px;border-radius:8px;overflow:hidden;border:1.5px solid var(--line);flex-shrink:0;}
.photo-thumb img{width:100%;height:100%;object-fit:cover;display:block;cursor:pointer;}
.photo-thumb .rm{
  position:absolute;top:1px;right:1px;width:17px;height:17px;border-radius:50%;
  background:rgba(20,20,20,0.65);color:#fff;font-size:11px;line-height:17px;text-align:center;
  cursor:pointer;font-weight:700;
}
.photo-add{
  width:56px;height:56px;border-radius:8px;border:1.5px dashed var(--line);
  display:flex;align-items:center;justify-content:center;flex-direction:column;
  cursor:pointer;color:var(--green);font-size:19px;flex-shrink:0;background:var(--green-pale);
}
.photo-add span{font-size:9px;color:var(--ink-soft);font-weight:600;margin-top:1px;}
.photo-input{display:none;}

.lightbox{
  position:fixed;inset:0;background:rgba(10,20,15,0.88);z-index:100;
  display:flex;align-items:center;justify-content:center;padding:20px;
}
.lightbox img{max-width:100%;max-height:100%;border-radius:8px;}
.lightbox .close{position:absolute;top:16px;right:18px;color:#fff;font-size:28px;cursor:pointer;font-family:'Poppins',sans-serif;}

.legend-box{
  font-size:11px;color:var(--ink-soft);line-height:1.65;
  background:var(--green-pale);border-radius:10px;
  padding:10px 12px;margin-bottom:16px;
}
.legend-box b{color:var(--green-dark);}

.top-nav{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.top-nav .back{cursor:pointer;font-size:22px;font-family:'Poppins',sans-serif;font-weight:700;line-height:1;color:var(--green-dark);}
.top-nav .title{flex:1;}
.top-nav .title .t1{font-family:'Poppins',sans-serif;font-weight:700;font-size:17px;}
.top-nav .title .t2{font-size:11px;color:var(--ink-soft);}

.stamp-box{
  display:flex;align-items:center;gap:12px;
  background:var(--ok-bg);border-radius:10px;color:var(--green-dark);
  padding:11px 12px;margin-bottom:16px;
}
.stamp-box .icon{font-family:'Poppins',sans-serif;font-weight:800;font-size:20px;background:var(--ok);color:#fff;border-radius:50%;width:34px;height:34px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.stamp-box .txt{font-size:12px;line-height:1.4;}
.stamp-box .txt b{font-family:'Poppins',sans-serif;display:block;font-size:13px;}

.tabbar{
  position:fixed;bottom:0;left:0;right:0;
  background:#fff;border-top:1px solid var(--line);
  display:flex;max-width:640px;margin:0 auto;
  box-shadow:0 -2px 8px rgba(20,50,35,0.05);
}
.tabbar .tab{
  flex:1;text-align:center;padding:11px 4px 9px;cursor:pointer;
  font-family:'Poppins',sans-serif;font-weight:600;font-size:10.5px;
  color:var(--ink-soft);
  border-top:3px solid transparent;
}
.tabbar .tab.active{color:var(--green);border-top-color:var(--orange);}
.tabbar .tab .ico{font-size:17px;display:block;margin-bottom:2px;}

.empty{text-align:center;padding:40px 10px;color:var(--ink-soft);font-size:13px;}
.toast{
  position:fixed;bottom:70px;left:50%;transform:translateX(-50%);
  background:var(--green-dark);color:#fff;
  padding:9px 16px;font-size:12px;font-family:'Poppins',sans-serif;font-weight:600;
  border-radius:20px;opacity:0;pointer-events:none;transition:opacity .25s ease;
  white-space:nowrap;z-index:50;
}
.toast.show{opacity:1;}

.confetti-layer{position:fixed;inset:0;pointer-events:none;z-index:200;overflow:hidden;}
.confetti-piece{
  position:absolute;top:-20px;width:9px;height:14px;opacity:0.95;
  animation-name:confetti-fall;
  animation-timing-function:cubic-bezier(.25,.46,.45,.94);
  animation-fill-mode:forwards;
  border-radius:2px;
}
@keyframes confetti-fall{
  0%{ transform: translateY(0) translateX(0) rotate(0deg); opacity:1; }
  100%{ transform: translateY(105vh) translateX(var(--drift,0px)) rotate(var(--spin,540deg)); opacity:0.9; }
}
.success-badge{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0.6);
  background:var(--ok);color:#fff;width:84px;height:84px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:40px;
  z-index:201;pointer-events:none;opacity:0;
  animation:success-pop 1.1s cubic-bezier(.34,1.56,.64,1) forwards;
}
@keyframes success-pop{
  0%{ opacity:0; transform:translate(-50%,-50%) scale(0.4); }
  25%{ opacity:1; transform:translate(-50%,-50%) scale(1.08); }
  40%{ transform:translate(-50%,-50%) scale(1); }
  80%{ opacity:1; transform:translate(-50%,-50%) scale(1); }
  100%{ opacity:0; transform:translate(-50%,-50%) scale(1); }
}

.gp-row{display:flex;justify-content:space-between;align-items:center;padding:9px 4px;border-bottom:1px solid var(--line);font-size:12.5px;}
.gp-row:last-child{border-bottom:none;}
.gp-row .n{font-weight:600;}
.gp-row .frac{color:var(--ink-soft);font-weight:600;}

.report-unit{border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin-bottom:10px;}
.report-unit .ru-head{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:8px;}
.report-unit .ru-title{font-weight:700;font-size:14px;}
.report-unit .ru-sub{font-size:10.5px;color:var(--ink-soft);}
.report-badge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;flex-shrink:0;white-space:nowrap;}
.report-badge.done{background:var(--ok-bg);color:var(--green-dark);}
.report-badge.progress{background:var(--warn-bg);color:#8a611c;}
.report-badge.offen{background:var(--line);color:var(--ink-soft);}
.rv-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px 12px;font-size:12px;margin-bottom:8px;}
.rv-grid .k{color:var(--ink-soft);}
.rv-grid .v{font-weight:600;}
.rv-grid .v.r1{color:var(--ok);}
.rv-grid .v.r2{color:#4f9169;}
.rv-grid .v.r3{color:#a1731f;}
.rv-grid .v.r4{color:var(--bad);}
.rv-bem{font-size:12px;background:var(--paper);border-radius:8px;padding:8px 10px;margin-top:4px;line-height:1.5;}
.rv-photos{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
.rv-photos img{width:48px;height:48px;object-fit:cover;border-radius:6px;border:1px solid var(--line);cursor:pointer;}
.rv-meta{font-size:10.5px;color:var(--ink-soft);margin-top:8px;border-top:1px dashed var(--line);padding-top:6px;}

/* Statistics */
.stat-row{margin-bottom:14px;}
.stat-row .stat-label{display:flex;justify-content:space-between;font-size:12.5px;font-weight:600;margin-bottom:5px;}
.stat-row .stat-label .n{color:var(--ink-soft);font-weight:500;}
.stat-bar{display:flex;height:16px;border-radius:5px;overflow:hidden;background:var(--line);}
.stat-bar .seg{height:100%;}
.stat-bar .seg.r1{background:var(--ok);}
.stat-bar .seg.r2{background:#5FA97D;}
.stat-bar .seg.r3{background:var(--warn);}
.stat-bar .seg.r4{background:var(--bad);}
.stat-bar .seg.rnv{background:var(--ink-soft);}
.stat-legend{display:flex;gap:10px;flex-wrap:wrap;font-size:10px;color:var(--ink-soft);margin-top:10px;}
.stat-legend .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px;vertical-align:middle;}
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.kpi-card{background:var(--green-pale);border-radius:10px;padding:12px 14px;}
.kpi-card .kv{font-family:'Poppins',sans-serif;font-weight:800;font-size:22px;color:var(--green-dark);}
.kpi-card .kl{font-size:11px;color:var(--ink-soft);margin-top:2px;}
.prio-row{display:flex;align-items:center;gap:10px;padding:10px 4px;border-bottom:1px solid var(--line);}
.prio-row:last-child{border-bottom:none;}
.prio-rank{font-family:'Poppins',sans-serif;font-weight:800;font-size:14px;color:var(--bad);width:20px;flex-shrink:0;}
.prio-row .pn{flex:1;}
.prio-row .pn .pa{font-weight:600;font-size:13px;}
.prio-row .pn .pc{font-size:10.5px;color:var(--ink-soft);margin-top:1px;}
.prio-score{font-family:'Poppins',sans-serif;font-weight:700;font-size:12px;background:var(--bad-bg);color:var(--bad);padding:3px 9px;border-radius:20px;flex-shrink:0;}

@media print{
  .tabbar, .top-nav .back, #printBtn, .btn{display:none !important;}
  body{background:#fff;}
  .card, .report-unit{box-shadow:none;border:1px solid #ccc;break-inside:avoid;}
  #app{max-width:100%;padding-bottom:0;}
}
</style>
</head>

function fireConfetti(){
  const colors = ['#1B6E4A','#EE8B22','#2F8F5B','#DDA032','#5FA97D','#124F35'];
  const layer = document.createElement('div');
  layer.className = 'confetti-layer';
  const count = 46;
  for(let i=0;i<count;i++){
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    const left = Math.random()*100;
    const drift = (Math.random()*160-80) + 'px';
    const spin = (Math.random()*720 + 360) + 'deg';
    const duration = (1.1 + Math.random()*0.9).toFixed(2) + 's';
    const delay = (Math.random()*0.3).toFixed(2) + 's';
    p.style.left = left + 'vw';
    p.style.background = colors[i % colors.length];
    p.style.setProperty('--drift', drift);
    p.style.setProperty('--spin', spin);
    p.style.animationDuration = duration;
    p.style.animationDelay = delay;
    if(Math.random() > 0.5) p.style.borderRadius = '50%';
    layer.appendChild(p);
  }
  document.body.appendChild(layer);

  const badge = document.createElement('div');
  badge.className = 'success-badge';
  badge.textContent = '✓';
  document.body.appendChild(badge);

  setTimeout(()=>{ layer.remove(); }, 2400);
  setTimeout(()=>{ badge.remove(); }, 1200);
}

// Portable storage: uses Claude's built-in window.storage when running inside Claude,
// and falls back to a small backend API (see /functions/api/storage.js) when the app
// is hosted standalone (e.g. on Cloudflare Pages). This makes data persistence work
// in both environments without changing any of the app logic below.
const backendStorage = {
  async get(key){
    let r;
    try{ r = await fetch('/api/storage?key='+encodeURIComponent(key)); }
    catch(e){ throw new Error('Netzwerk nicht erreichbar (Speicher-API)'); }
    if(r.status===404) return null;
    if(!r.ok) throw new Error('Speicher-API Fehler beim Laden (HTTP '+r.status+')');
    return await r.json();
  },
  async set(key, value){
    let r;
    try{ r = await fetch('/api/storage', {method:'POST', headers:{'content-type':'application/json'}, body: JSON.stringify({key, value})}); }
    catch(e){ throw new Error('Netzwerk nicht erreichbar (Speicher-API)'); }
    if(!r.ok) throw new Error('Speicher-API Fehler beim Speichern (HTTP '+r.status+')');
    return await r.json();
  },
  async list(prefix){
    let r;
    try{ r = await fetch('/api/storage-list?prefix='+encodeURIComponent(prefix||'')); }
    catch(e){ throw new Error('Netzwerk nicht erreichbar (Speicher-API)'); }
    if(!r.ok) throw new Error('Speicher-API Fehler bei Liste (HTTP '+r.status+')');
    return await r.json();
  }
};
// Wichtig: Wenn window.storage vorhanden ist (z. B. in der Claude-Vorschau),
// NICHT bei einem Fehler still auf die Cloudflare-Backend-API zurückfallen —
// die gibt es dort gar nicht, und das hat bisher jeden echten Fehler als
// "keine Internetverbindung" getarnt. Stattdessen den echten Fehler durchreichen,
// damit er oben sichtbar wird.
const storage = {
  async get(key, shared){
    if(window.storage) return await window.storage.get(key, shared);
    return await backendStorage.get(key);
  },
  async set(key, value, shared){
    if(window.storage) return await window.storage.set(key, value, shared);
    return await backendStorage.set(key, value);
  },
  async list(prefix, shared){
    if(window.storage) return await window.storage.list(prefix, shared);
    return await backendStorage.list(prefix);
  }
};

function nameKey(name){
  return 'hmprofile:' + (name||'').trim().toLowerCase().replace(/[^a-z0-9äöüß]+/gi, '_').slice(0, 80);
}
async function loadNamedProfile(name){
  if(!name || !name.trim()) return null;
  try{ const r = await storage.get(nameKey(name), true); return r ? JSON.parse(r.value) : null; }catch(e){ return null; }
}
async function saveNamedProfile(name, selected){
  let ok = false;
  let detail = '';
  try{
    const result = await storage.set(nameKey(name), JSON.stringify({name, selected, updatedAt:new Date().toISOString()}), true);
    ok = !!result;
    if(!ok) detail = 'Speicher hat den Eintrag nicht bestätigt';
  }catch(e){
    ok = false;
    detail = (e && e.message) ? e.message : 'Unbekannter Fehler beim Speichern';
  }
  await addKnownName(name);
  return {ok, detail};
}
async function loadKnownNames(){
  try{
    const r = await storage.get('known_names', true);
    if(r){
      const arr = JSON.parse(r.value);
      if(Array.isArray(arr) && arr.length) return arr;
    }
  }catch(e){}
  // Backfill: no registry yet (or empty) — reconstruct from existing hmprofile: entries
  // so names saved by an earlier version of the app still show up.
  try{
    const list = await storage.list('hmprofile:', true);
    if(!list || !list.keys || !list.keys.length) return [];
    const names = [];
    for(const k of list.keys){
      try{
        const r = await storage.get(k, true);
        if(!r) continue;
        const data = JSON.parse(r.value);
        const n = data && data.name ? data.name : k.replace('hmprofile:', '');
        if(n && !names.some(x=>x.toLowerCase()===n.toLowerCase())) names.push(n);
      }catch(e){}
    }
    if(names.length){
      try{ await storage.set('known_names', JSON.stringify(names), true); }catch(e){}
    }
    return names;
  }catch(e){ return []; }
}
async function addKnownName(name){
  name = (name||'').trim();
  if(!name) return;
  try{
    const current = await loadKnownNames();
    const withoutDup = current.filter(n => n.toLowerCase() !== name.toLowerCase());
    const updated = [name, ...withoutDup].slice(0, 60);
    await storage.set('known_names', JSON.stringify(updated), true);
    state.knownNames = updated;
  }catch(e){}
}
async function loadAllSubmissions(){
  try{
    const list = await storage.list('unit:', true);
    if(!list || !list.keys || !list.keys.length) return {};
    const out = {};
    for(const k of list.keys){
      try{ const r = await storage.get(k, true); if(r) out[k.replace('unit:','')] = JSON.parse(r.value); }catch(e){}
    }
    return out;
  }catch(e){ return {}; }
}
async function saveSubmission(unitId, record){
  // Erst prüfen, ob der Eintrag überhaupt in ein Speicher-Feld passt, BEVOR
  // wir einen Netzwerk-Call machen. Das verhindert die irreführende Meldung
  // "keine Internetverbindung", wenn in Wirklichkeit die Fotos zu groß sind.
  const bytes = recordSizeBytes(record);
  const limit = storageByteLimit();
  if(bytes > limit){
    state.submissions[unitId] = record;
    return {ok:false, reason:'toolarge', bytes, limit};
  }
  let ok = false;
  let detail = '';
  try{
    const result = await storage.set('unit:'+unitId, JSON.stringify(record), true);
    ok = !!result;
    if(!ok) detail = 'Speicher hat den Eintrag nicht bestätigt';
  }catch(e){
    ok = false;
    detail = (e && e.message) ? e.message : 'Unbekannter Fehler beim Speichern';
  }
  // Keep it visible locally in this session even if the network save failed,
  // so the person doesn't lose what they just entered while working.
  state.submissions[unitId] = record;
  return {ok, reason: ok ? null : 'network', detail};
}

function unitStatus(unitId){
  const r = state.submissions[unitId];
  if(!r) return 'offen';
  if(r.status === 'submitted') return 'done';
  return 'progress';
}
function statusLabel(s){ return s === 'done' ? 'Abgeschlossen' : s === 'progress' ? 'In Bearbeitung' : 'Offen'; }

function compressImage(file){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = e=>{
      const img = new Image();
      img.onload = ()=>{
        const maxDim = 900;
        let w = img.width, h = img.height;
        if(w > h && w > maxDim){ h = Math.round(h * maxDim / w); w = maxDim; }
        else if(h >= w && h > maxDim){ w = Math.round(w * maxDim / h); h = maxDim; }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);

        // Zielgröße pro Foto: möglichst unter ~180 KB, damit ein Treppenhaus
        // mit mehreren Fotos nicht an Speicherlimits scheitert.
        const TARGET_BYTES = 180 * 1024;
        let quality = 0.6;
        let dataUrl = canvas.toDataURL('image/jpeg', quality);
        let tries = 0;
        while(dataUrl.length * 0.75 > TARGET_BYTES && quality > 0.25 && tries < 5){
          quality -= 0.1;
          dataUrl = canvas.toDataURL('image/jpeg', quality);
          tries++;
        }
        // Falls das Foto immer noch riesig ist (sehr großes Ausgangsbild),
        // zusätzlich verkleinern statt nur die Qualität weiter zu drücken.
        if(dataUrl.length * 0.75 > TARGET_BYTES * 1.8){
          const w2 = Math.round(w * 0.7), h2 = Math.round(h * 0.7);
          canvas.width = w2; canvas.height = h2;
          ctx.drawImage(img, 0, 0, w2, h2);
          dataUrl = canvas.toDataURL('image/jpeg', 0.55);
        }
        resolve(dataUrl);
      };
      img.onerror = ()=> reject(new Error('Bild konnte nicht gelesen werden'));
      img.src = e.target.result;
    };
    reader.onerror = ()=> reject(new Error('Datei konnte nicht gelesen werden'));
    reader.readAsDataURL(file);
  });
}

function dataUrlBytes(dataUrl){
  if(!dataUrl) return 0;
  const idx = dataUrl.indexOf(',');
  const b64 = idx>=0 ? dataUrl.slice(idx+1) : dataUrl;
  return Math.round(b64.length * 0.75);
}

function recordSizeBytes(record){
  try{ return dataUrlBytes(JSON.stringify(record)) * (4/3); }catch(e){ return 0; }
}

function countAllPhotos(){
  let n = 0;
  Object.values(state.submissions).forEach(rec=>{
    if(!rec || !rec.photos) return;
    Object.values(rec.photos).forEach(arr=> n += (arr ? arr.length : 0));
  });
  return n;
}

function sanitizeFileName(s){
  return String(s||'').replace(/[\\/:*?"<>|]/g, '-').replace(/\s+/g,' ').trim();
}

async function downloadAllPhotos(){
  try{
    if(typeof JSZip === 'undefined'){
      toast('⚠️ ZIP-Modul konnte nicht geladen werden (Internetverbindung prüfen)');
      return;
    }
    const total = countAllPhotos();
    if(total === 0){ toast('Es wurden noch keine Fotos hochgeladen'); return; }
    toast('Fotos werden gepackt …');

    const zip = new JSZip();
    const catLabel = {};
    CATS.forEach(c=> catLabel[c.key] = c.label);

    DATA.units.forEach(u=>{
      const rec = state.submissions[u.id];
      if(!rec || !rec.photos) return;
      const photoCats = Object.keys(rec.photos).filter(k=> rec.photos[k] && rec.photos[k].length);
      if(!photoCats.length) return;

      const folder = sanitizeFileName('WIE ' + u.wie + ' - ' + u.objekt) + '/' + sanitizeFileName(u.adresse);
      photoCats.forEach(catKey=>{
        const label = sanitizeFileName(catLabel[catKey] || catKey);
        rec.photos[catKey].forEach((dataUrl, idx)=>{
          const m = /^data:image\/(\w+);base64,(.*)$/.exec(dataUrl || '');
          if(!m) return;
          const ext = m[1] === 'jpeg' ? 'jpg' : m[1];
          const fileName = `${folder}/${label}${photoCats.length>1 || rec.photos[catKey].length>1 ? '-'+(idx+1) : ''}.${ext}`;
          zip.file(fileName, m[2], {base64:true});
        });
      });
    });

    const blob = await zip.generateAsync({type:'blob'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'Treppenhaus-Check-Fotos.zip';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(()=> URL.revokeObjectURL(url), 3000);
    toast('Fotos heruntergeladen ✓ (' + total + ')');
  }catch(err){
    toast('Foto-Download fehlgeschlagen: ' + (err && err.message ? err.message : 'unbekannter Fehler'));
  }
}

  <div class="top-nav">
    <div class="back" id="backBtn">‹</div>
    <div class="title"><div class="t1">Bericht für das Büro</div><div class="t2">Stand: ${formatDate(new Date().toISOString())}</div></div>
  </div>
  <div class="card">
    <div class="howto"><b>Was ist das?</b> Hier stehen alle erfassten Daten aus allen Gebäuden zusammen, egal wer sie eingetragen hat. Zum Weiterverarbeiten (z. B. für die Prioritätenliste) einfach die Excel-Datei herunterladen.</div>
    <div class="rv-grid" style="grid-template-columns:1fr 1fr 1fr;">
      <div><div class="k">Gesamt</div><div class="v">${totalAll}</div></div>
      <div><div class="k">Abgeschlossen</div><div class="v r1">${doneAll}</div></div>
      <div><div class="k">In Bearbeitung</div><div class="v r3">${progressAll}</div></div>
    </div>
  </div>
  <button class="btn secondary" id="printBtn" style="margin-bottom:10px;">⬇️ Tabelle als Excel-Datei herunterladen</button>
  <button class="btn ghost" id="photosBtn" style="margin-bottom:16px;">📷 Alle Fotos herunterladen (ZIP · ${countAllPhotos()})</button>
  ${reportBodyHtml()}
  <div class="legend-box" style="margin-top:16px;">
    <b>Legende:</b> 1 sehr gut – kein Handlungsbedarf &nbsp;·&nbsp; 2 gut – geringer Handlungsbedarf &nbsp;·&nbsp; 3 mangelhaft – kurzfristiger Handlungsbedarf (&lt; 3 Monate) &nbsp;·&nbsp; 4 stark mangelhaft – dringender Handlungsbedarf (sofort) &nbsp;·&nbsp; n.v. nicht vorhanden<br>
    Alternativ: 0 kein Sanierungsbedarf &nbsp;·&nbsp; E noch erhaltungswürdig &nbsp;·&nbsp; S erhebliche Verschmutzung/Beschädigung<br>
    KG-Brandschutztüren: H = Holz &nbsp;·&nbsp; M = Metall
  </div>
  `;
}

function renderStats(){
  const records = Object.values(state.submissions);
  const totalUnits = DATA.units.length;
  const withData = records.length;

  // category distributions
  const dist = {};
  CATS.forEach(c=> dist[c.key] = {});
  records.forEach(rec=>{
    const vals = rec.values || {};
    CATS.forEach(c=>{
      const v = vals[c.key];
      if(v) dist[c.key][v] = (dist[c.key][v]||0) + 1;
    });
  });

  const scaleCats = CATS.filter(c=>c.opts==='scale');
  const materialCats = CATS.filter(c=>c.opts==='material');

  // total mangel counts (3+4+S) for KPI
  let totalBad = 0, totalRated = 0;
  scaleCats.forEach(c=>{
    const d = dist[c.key];
    Object.keys(d).forEach(k=>{
      totalRated += d[k];
      if(k==='3'||k==='4'||k==='S') totalBad += d[k];
    });
  });
  const badPct = totalRated ? Math.round(totalBad/totalRated*100) : 0;

  // priority list: score per unit based on bad ratings
  const scored = [];
  DATA.units.forEach(u=>{
    const rec = state.submissions[u.id];
    if(!rec) return;
    const vals = rec.values || {};
    let score = 0;
    const badCats = [];
    CATS.forEach(c=>{
      const v = vals[c.key];
      if(v==='4'){ score += 3; badCats.push(c.label); }
      else if(v==='S'){ score += 2; badCats.push(c.label); }
      else if(v==='3'){ score += 1; badCats.push(c.label); }
    });
    if(score > 0) scored.push({u, score, badCats});
  });
  scored.sort((a,b)=> b.score - a.score);
  const top = scored.slice(0, 12);

  return `
  <div class="masthead">
    <div class="left"><div class="logo-mark">${logoSvg()}</div>
      <div class="brand">Statistik<small>Für die Auswertung</small></div>
    </div>
  </div>

  <div class="howto" style="margin-bottom:14px;">
    <b>Was ist das?</b> Diese Seite ist für die Auswertung gedacht. Sie zeigt, welche Bauteile am häufigsten Handlungsbedarf haben und listet die Treppenhäuser mit dem größten Sanierungsbedarf ganz unten auf.
  </div>

  <div class="kpi-grid" style="margin-bottom:14px;">
    <div class="kpi-card"><div class="kv">${withData} / ${totalUnits}</div><div class="kl">Treppenhäuser mit Daten</div></div>
    <div class="kpi-card"><div class="kv">${badPct}%</div><div class="kl">Bewertungen mit Handlungsbedarf (3, 4, S)</div></div>
  </div>

  <div class="legend-box">
    Grundlage für die <b>Prioritätenliste</b> gemäß Zielvorgabe: Auswertung bis 30.09.2026 (Bereich Technik).
  </div>

  <button class="btn orange" id="quickDownloadBtnStats" style="margin-bottom:14px;">⬇️ Tabelle als Excel-Datei herunterladen</button>

  <div class="card">
    <div style="font-family:'Poppins',sans-serif;font-weight:700;font-size:14px;margin-bottom:14px;">Bewertungsverteilung je Kategorie</div>
    ${scaleCats.map(c=>{
      const d = dist[c.key];
      const total = Object.values(d).reduce((a,b)=>a+b,0);
      if(!total) return `
        <div class="stat-row">
          <div class="stat-label"><span>${c.label}</span><span class="n">keine Daten</span></div>
          <div class="stat-bar"><div class="seg" style="width:100%;background:var(--line);"></div></div>
        </div>`;
      const order = ['1','2','3','4','n.v.','0','E','S'];
      const segs = order.filter(k=>d[k]).map(k=>{
        const w = (d[k]/total*100).toFixed(1);
        return `<div class="seg ${RCLASS[k]}" style="width:${w}%;" title="${k}: ${d[k]}"></div>`;
      }).join('');
      return `
      <div class="stat-row">
        <div class="stat-label"><span>${c.label}</span><span class="n">${total} bewertet</span></div>
        <div class="stat-bar">${segs}</div>
      </div>`;
    }).join('')}
    <div class="stat-legend">
      <span><span class="dot" style="background:var(--ok);"></span>1 sehr gut</span>
      <span><span class="dot" style="background:#5FA97D;"></span>2 gut</span>
      <span><span class="dot" style="background:var(--warn);"></span>3 mangelhaft</span>
      <span><span class="dot" style="background:var(--bad);"></span>4 stark mangelhaft</span>
      <span><span class="dot" style="background:var(--ink-soft);"></span>n.v.</span>
    </div>
  </div>

  <div class="card">
    <div style="font-family:'Poppins',sans-serif;font-weight:700;font-size:14px;margin-bottom:10px;">KG-Brandschutztüren</div>
    ${materialCats.map(c=>{
      const d = dist[c.key];
      const total = Object.values(d).reduce((a,b)=>a+b,0);
      return `<div class="rv-meta" style="border-top:none;padding-top:0;">
        ${total ? `Holz (H): <b>${d['H']||0}</b> &nbsp;·&nbsp; Metall (M): <b>${d['M']||0}</b> &nbsp;·&nbsp; nicht vorhanden: <b>${d['n.v.']||0}</b> &nbsp;·&nbsp; erfasst: ${total}` : 'Noch keine Daten'}
      </div>`;
    }).join('')}
  </div>

  <div class="group-title">Prioritätenliste · größter Handlungsbedarf</div>
  <div class="card" style="padding:4px 12px;">
    ${top.length ? top.map((item,i)=>`
      <div class="prio-row">
        <div class="prio-rank">${i+1}</div>
        <div class="pn">
          <div class="pa">${item.u.adresse}</div>
          <div class="pc"><span class="wie-tag">WIE ${item.u.wie}</span>${item.badCats.slice(0,3).join(' · ')}${item.badCats.length>3 ? ' …' : ''}</div>
        </div>
        <div class="prio-score">${item.score} Pkt.</div>
      </div>
    `).join('') : `<div class="empty">Noch keine Bewertungen mit Handlungsbedarf erfasst.</div>`}
  </div>
  `;
}

function renderForm(){
  const u = DATA.units.find(x=>x.id===state.unitId);
  const existing = state.submissions[u.id];
  const isDone = existing && existing.status === 'submitted';
  const values = state.draft.values || (existing ? {...existing.values} : {});
  const photos = state.draft.photos || (existing && existing.photos ? JSON.parse(JSON.stringify(existing.photos)) : {});
  const bemerkungen = state.draft.bemerkungen !== undefined ? state.draft.bemerkungen : (existing ? existing.bemerkungen : '');

  const allFilled = CATS.every(c => values[c.key]);

  return `
  <div class="top-nav">
    <div class="back" id="backBtn">‹</div>
    <div class="title"><div class="t1">${u.adresse}</div><div class="t2"><span class="wie-tag">WIE ${u.wie}</span>${u.objekt} · Sanierung ${u.jahr}</div></div>
  </div>

  ${isDone ? `
  <div class="stamp-box">
    <div class="icon">✓</div>
    <div class="txt"><b>Geprüft &amp; abgesendet</b>von ${escHtml(existing.submittedBy)} am ${formatDate(existing.submittedAt)}</div>
  </div>` : `
  <div class="deadline-box">⏰ Bitte bis zum <b>28. August 2026</b> ausfüllen.</div>
  <div class="howto">
    <b>So geht's:</b> Tippe bei jedem Punkt unten auf eine Bewertung (1–4, n.v. oder alternativ 0/E/S). Nochmal antippen hebt die Auswahl wieder auf. Über 📷 kannst du optional ein Foto zu dem Punkt hinzufügen. Bemerkungen sind freiwillig. Sobald alle 11 Punkte bewertet sind, erscheint unten der „Absenden"-Button.
  </div>`}

  <div class="legend-box">
    <b>1</b> sehr gut &nbsp; <b>2</b> gut &nbsp; <b>3</b> mangelhaft &nbsp; <b>4</b> stark mangelhaft &nbsp; <b>n.v.</b> nicht vorhanden<br>
    Alternativ: <b>0</b> kein Sanierungsbedarf &nbsp; <b>E</b> noch erhaltungswürdig &nbsp; <b>S</b> erhebliche Verschmutzung/Beschädigung
  </div>

  <div class="card">
    ${CATS.map(c=>{
      const opts = c.opts === 'material' ? MATERIAL_OPTS : SCALE_OPTS;
      const val = values[c.key];
      const catPhotos = photos[c.key] || [];
      return `
      <div class="cat-block">
        <div class="cat-name">${c.label} ${!val ? '<span class="req">*</span>' : ''}</div>
        <div class="chip-row">
          ${opts.map(o=>`<span class="chip ${c.opts==='material'?'':'small'} ${val===o.v?'active '+o.c:''}" data-cat="${c.key}" data-val="${o.v}">${o.v}${o.label?`<br><span style="font-size:9.5px;font-weight:500;opacity:0.85;">${o.label}</span>`:''}</span>`).join('')}
        </div>
        <div class="photo-strip" data-photostrip="${c.key}">
          ${catPhotos.map((src,i)=>`
            <div class="photo-thumb">
              <img src="${src}" data-lightbox="${src}">
              ${!isDone ? `<div class="rm" data-rmphoto="${c.key}" data-idx="${i}">×</div>` : ''}
            </div>`).join('')}
          ${!isDone ? `
          <label class="photo-add">
            📷<span>Foto</span>
            <input type="file" accept="image/*" capture="environment" class="photo-input" data-photocat="${c.key}">
          </label>` : ''}
        </div>
      </div>`;
    }).join('')}
    <div class="field" style="margin-top:4px;">
      <label>Bemerkungen (optional)</label>
      <textarea id="bemerkungenInput" placeholder="Auffälligkeiten, Details …" ${isDone?'disabled':''}>${escHtml(bemerkungen)}</textarea>
    </div>
  </div>

  ${!isDone ? `
    <button class="btn orange" id="submitBtn" ${allFilled ? '' : 'disabled'}>${allFilled ? 'Absenden' : `Noch ${CATS.filter(c=>!values[c.key]).length} Feld(er) offen`}</button>
    <p class="intro" style="margin-top:10px;text-align:center;">Deine Eingaben werden automatisch gespeichert. Der Absenden-Button erscheint aktiv, sobald alle Felder ausgefüllt sind.</p>
  ` : `<button class="btn secondary" id="reopenBtn">Bearbeitung wieder öffnen</button>`}
  `;
}

function formatDate(iso){
  try{
    const d = new Date(iso);
    return d.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric'}) + ' ' + d.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});
  }catch(e){ return iso; }
}
function escHtml(s){ return (s||'').replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function escAttr(s){ return escHtml(s).replace(/'/g,'&#39;'); }

function render(){
  const app = document.getElementById('app');
  try{
    let html = '';
    if(state.screen==='loading') html = renderLoading();
    else if(state.screen==='setup') html = renderSetup();
    else if(state.screen==='overview') html = renderOverview();
    else if(state.screen==='global') html = renderGlobal();
    else if(state.screen==='stats') html = renderStats();
    else if(state.screen==='report') html = renderReport();
    else if(state.screen==='form') html = renderForm();

    const showTabs = state.screen==='overview' || state.screen==='global' || state.screen==='stats';
    app.innerHTML = html + (showTabs ? `
      <div class="tabbar">
        <div class="tab ${state.screen==='overview'?'active':''}" data-tab="overview"><span class="ico">🏠</span>Meine Gebäude</div>
        <div class="tab ${state.screen==='global'?'active':''}" data-tab="global"><span class="ico">📋</span>Zusammenfassung</div>
        <div class="tab ${state.screen==='stats'?'active':''}" data-tab="stats"><span class="ico">📊</span>Statistik</div>
      </div>` : '') + (state.lightboxSrc ? `
      <div class="lightbox" id="lightbox"><div class="close" id="lightboxClose">×</div><img src="${state.lightboxSrc}"></div>` : '');

    bindEvents();
  }catch(err){
    console.error('Render-Fehler:', err);
    app.innerHTML = `
      <div class="masthead"><div class="left"><div class="logo-mark">${logoSvg()}</div>
        <div class="brand">Treppenhaus-Check<small>BEROLINA</small></div></div>
      </div>
      <div class="card">
        <div class="howto" style="background:var(--bad-bg);color:#8a2b1c;">
          <b>Es ist ein unerwarteter Fehler aufgetreten.</b><br>
          Deine bisherigen Eingaben sind nicht verloren. Bitte lade die Seite neu.
        </div>
        <button class="btn orange" style="margin-top:12px;" onclick="location.reload()">Seite neu laden</button>
      </div>`;
  }
}

function bindEvents(){
  const app = document.getElementById('app');

  app.querySelectorAll('.tab').forEach(el=>{ el.onclick = ()=> go(el.dataset.tab, {search:''}); });

  app.querySelectorAll('[data-lightbox]').forEach(el=>{
    el.onclick = ()=>{ state.lightboxSrc = el.dataset.lightbox; render(); };
  });
  const lb = document.getElementById('lightbox');
  if(lb){
    const closeLb = ()=>{ state.lightboxSrc = null; render(); };
    document.getElementById('lightboxClose').onclick = closeLb;
    lb.onclick = e=>{ if(e.target === lb) closeLb(); };
  }

  if(state.screen==='setup'){
    const searchInput = document.getElementById('searchInput');

    async function selectName(name){
      state.draft.name = name;
      if(state.draft.lastLookupName === name){ render(); return; }
      const saved = await loadNamedProfile(name);
      if(state.draft.name !== name) return; // changed again meanwhile
      state.draft.lastLookupName = name;
      if(saved && saved.selected && saved.selected.length){
        state.draft.selectedObjs = new Set(saved.selected);
        render();
        toast('Vorherige Auswahl für ' + name + ' geladen ✓');
      } else {
        // no saved selection for this name — make sure nobody else's picks leak in
        state.draft.selectedObjs = new Set();
        render();
      }
    }

    app.querySelectorAll('.name-option').forEach(el=>{
      el.onclick = ()=> selectName(el.dataset.name);
    });
    if(searchInput) searchInput.oninput = e=>{ state.search = e.target.value; render(); preserveFocus(searchInput); };
    app.querySelectorAll('#objList input[type=checkbox]').forEach(cb=>{
      cb.onchange = ()=>{
        const key = cb.dataset.wie + '|' + cb.dataset.objekt;
        if(!state.draft.selectedObjs) state.draft.selectedObjs = new Set();
        if(cb.checked) state.draft.selectedObjs.add(key);
        else state.draft.selectedObjs.delete(key);
      };
    });
    const startBtn = document.getElementById('startBtn');
    if(startBtn) startBtn.onclick = async ()=>{
      const name = (state.draft.name || '').trim();
      if(!name){ toast('Bitte Namen auswählen'); return; }
      const selected = Array.from(state.draft.selectedObjs || []);
      const result = await saveNamedProfile(name, selected);
      state.profile = { name, selected };
      state.draft = {};
      go('overview', {search:''});
      if(!result.ok){
        toast('⚠️ Auswahl konnte nicht gespeichert werden: ' + (result.detail || 'unbekannter Fehler'), 4500);
      }
    };
  }

  if(state.screen==='overview'){
    const searchInput = document.getElementById('searchInput');
    if(searchInput) searchInput.oninput = e=>{ state.search = e.target.value; render(); preserveFocus(searchInput); };
    const editBtn = document.getElementById('editSelBtn');
    if(editBtn) editBtn.onclick = ()=>{
      state.draft.selectedObjs = new Set(state.profile.selected);
      state.draft.name = state.profile.name;
      state.search = '';
      go('setup');
    };
    const pickBtn = document.getElementById('pickBtn');
    if(pickBtn) pickBtn.onclick = ()=>{
      state.draft.selectedObjs = new Set(state.profile.selected);
      state.draft.name = state.profile.name;
      go('setup');
    };
    app.querySelectorAll('.unit-row').forEach(el=>{
      el.onclick = ()=>{ state.draft = {}; go('form', {unitId: el.dataset.unit}); };
    });
  }

  if(state.screen==='global'){
    const btn = document.getElementById('openReportBtn');
    if(btn) btn.onclick = ()=> go('report');
    const quickBtn = document.getElementById('quickDownloadBtnGlobal');
    if(quickBtn) quickBtn.onclick = ()=> downloadTableReport();
  }

  if(state.screen==='stats'){
    const quickBtn = document.getElementById('quickDownloadBtnStats');
    if(quickBtn) quickBtn.onclick = ()=> downloadTableReport();
  }

  if(state.screen==='report'){
    const backBtn = document.getElementById('backBtn');
    if(backBtn) backBtn.onclick = ()=> go('global');
    const printBtn = document.getElementById('printBtn');
    if(printBtn) printBtn.onclick = ()=> downloadTableReport();
    const photosBtn = document.getElementById('photosBtn');
    if(photosBtn) photosBtn.onclick = ()=> downloadAllPhotos();
  }

  if(state.screen==='form'){
    const backBtn = document.getElementById('backBtn');
    if(backBtn) backBtn.onclick = ()=> go('overview');

    app.querySelectorAll('.chip[data-cat]').forEach(chip=>{
      chip.onclick = async ()=>{
        if(!state.draft.values) state.draft.values = {};
        const cat = chip.dataset.cat, val = chip.dataset.val;
        if(state.draft.values[cat] === val){ delete state.draft.values[cat]; }
        else { state.draft.values[cat] = val; }
        await autosave();
        render();
      };
    });

    app.querySelectorAll('.photo-input').forEach(inp=>{
      inp.onchange = async e=>{
        const file = e.target.files[0];
        if(!file) return;
        toast('Foto wird gespeichert …');
        try{
          const dataUrl = await compressImage(file);
          const cat = inp.dataset.photocat;
          if(!state.draft.photos) state.draft.photos = {};
          if(!state.draft.photos[cat]) state.draft.photos[cat] = [];
          state.draft.photos[cat].push(dataUrl);
          await autosave();
          render();
          toast('Foto gespeichert ✓');
        }catch(err){ toast('Foto konnte nicht geladen werden'); }
      };
    });
    app.querySelectorAll('[data-rmphoto]').forEach(el=>{
      el.onclick = async ()=>{
        const cat = el.dataset.rmphoto, idx = parseInt(el.dataset.idx);
        if(state.draft.photos && state.draft.photos[cat]) state.draft.photos[cat].splice(idx,1);
        await autosave();
        render();
      };
    });

    const bem = document.getElementById('bemerkungenInput');
    if(bem) bem.oninput = async e=>{ state.draft.bemerkungen = e.target.value; await autosave(); };

    const submitBtn = document.getElementById('submitBtn');
    if(submitBtn) submitBtn.onclick = async ()=>{
      submitBtn.disabled = true;
      submitBtn.textContent = 'Wird gespeichert …';
      const u = DATA.units.find(x=>x.id===state.unitId);
      const record = {
        values: state.draft.values || {},
        photos: state.draft.photos || {},
        bemerkungen: state.draft.bemerkungen || '',
        status: 'submitted',
        submittedBy: state.profile.name,
        submittedAt: new Date().toISOString(),
        updatedAt: new Date().toISOString(),
      };
      const result = await saveSubmission(u.id, record);
      if(!result.ok){
        if(result.reason === 'toolarge'){
          const mb = (result.bytes/1024/1024).toFixed(1);
          toast('⚠️ Zu viele/große Fotos in diesem Treppenhaus (' + mb + ' MB) – bitte ein Foto entfernen und nochmal absenden', 4500);
        } else {
          toast('⚠️ Speichern fehlgeschlagen: ' + (result.detail || 'unbekannter Fehler') + ' – bitte nochmal versuchen', 4500);
        }
        submitBtn.disabled = false;
        submitBtn.textContent = 'Absenden';
        return;
      }
      fireConfetti();
      toast('Absenden erfolgreich ✓');
      setTimeout(()=>{
        state.draft = {};
        go('overview');
      }, 1600);
    };
    const reopenBtn = document.getElementById('reopenBtn');
    if(reopenBtn) reopenBtn.onclick = async ()=>{
      const u = DATA.units.find(x=>x.id===state.unitId);
      const existing = state.submissions[u.id];
      const record = {...existing, status:'progress', updatedAt: new Date().toISOString()};
      await saveSubmission(u.id, record);
      state.draft = {values:{...record.values}, photos: JSON.parse(JSON.stringify(record.photos||{})), bemerkungen: record.bemerkungen};
      render();
    };
  }
}

function preserveFocus(el){
  const val = el.value;
  el.focus();
  el.value = '';
  el.value = val;
}

let autosaveTimer = null;
async function autosave(){
  clearTimeout(autosaveTimer);
  return new Promise(resolve=>{
    autosaveTimer = setTimeout(async ()=>{
      const u = DATA.units.find(x=>x.id===state.unitId);
      const existing = state.submissions[u.id];
      if(existing && existing.status === 'submitted'){ resolve(); return; }
      const record = {
        values: state.draft.values || {},
        photos: state.draft.photos || {},
        bemerkungen: state.draft.bemerkungen || '',
        status: 'progress',
        submittedBy: existing ? existing.submittedBy : null,
        submittedAt: existing ? existing.submittedAt : null,
        updatedAt: new Date().toISOString(),
      };
      try{
        const result = await saveSubmission(u.id, record);
        if(result && !result.ok && result.reason === 'toolarge'){
          const mb = (result.bytes/1024/1024).toFixed(1);
          toast('⚠️ Fotos zu groß für dieses Treppenhaus (' + mb + ' MB) – bitte eines entfernen');
        }
      }catch(e){}
      resolve();
    }, 350);
  });
}

init();
</script>
</body>
</html>
